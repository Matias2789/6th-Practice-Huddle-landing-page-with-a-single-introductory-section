<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
  
  <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="css/estilos.css">

</head>
<body>
  <main class="container">
    <section class="images_content">
      <img src="images/logo.svg" alt="" class="images_logo">
      <img src="images/illustration-mockups.svg" alt="" class="images_ejemplo">
    </section>
    <section class="content">
      <article class="text_content">
        <h1>Build The Community <br> Your Fans Will Love</h1>
  
        <p>
          Huddle re-imagines the way we build communities. You have a  voice, but so does your audience. 
          Create connections with your users as you engage in genuine discussion. 
        </p>
        
        <button>Register</button>
      </article>
      <div class="icon_content">
        <i class='bx bxl-facebook'></i>
        <i class='bx bxl-twitter' ></i>
        <i class='bx bxl-instagram' ></i>
      </div>
    </section>
  </main>
</body>
</html>
